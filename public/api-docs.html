<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiseWallet API - Documentação</title>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --error: #ef4444;
            --code-font: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem; width: 100%; flex: 1; }

        header { text-align: center; margin-bottom: 3rem; border-bottom: 1px solid var(--card-bg); padding-bottom: 2rem; }
        h1 { font-size: 2.5rem; background: linear-gradient(to right, var(--primary), #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: var(--text-muted); }

        .endpoint-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .label {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: block;
            font-weight: 700;
        }

        /* Área do URL e Input */
        .controls-area {
            background-color: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .url-display {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            font-family: var(--code-font);
            color: var(--primary);
            word-break: break-all;
        }
        
        .method {
            background-color: var(--primary);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            margin-right: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Estilo do Input de Categoria */
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        input[type="text"] {
            background-color: #1e293b;
            border: 1px solid #475569;
            color: white;
            padding: 0.6rem;
            border-radius: 6px;
            flex-grow: 1;
            font-size: 0.95rem;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-test {
            background-color: var(--primary);
            color: white;
            width: 100%;
        }
        .btn-test:hover { background-color: var(--primary-hover); }
        .btn-test:disabled { background-color: var(--text-muted); cursor: not-allowed; }

        .console-output {
            background-color: #000;
            color: var(--success);
            padding: 1.5rem;
            border-radius: 8px;
            font-family: var(--code-font);
            font-size: 0.85rem;
            min-height: 100px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #334155;
            display: none;
            margin-top: 1rem;
        }

        footer { text-align: center; padding: 2rem; color: var(--text-muted); border-top: 1px solid var(--card-bg); margin-top: 2rem;}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>WiseWallet API</h1>
            <p class="subtitle">Teste de Integração e Filtros</p>
        </header>

        <main>
            <section class="endpoint-card">
                <span class="label">Configurar Pedido (GET)</span>
                
                <div class="controls-area">
                    <div class="url-display">
                        <span class="method">GET</span>
                        <span id="urlPreview">...</span>
                    </div>

                    <div class="input-group">
                        <input type="text" id="categoryInput" placeholder="Filtrar por Categoria (ex: Alimentação)">
                    </div>
                </div>

                <button class="btn btn-test" id="testBtn">Testar Endpoint</button>

                <div id="consoleArea" style="display: none;">
                    <div style="margin-top: 1.5rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between;">
                        <span class="label" style="margin:0">Resposta JSON</span>
                        <span class="label" id="statusCode" style="color: var(--success); margin:0"></span>
                    </div>
                    <div class="console-output" id="outputConsole"></div>
                </div>
            </section>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 WiseWallet API Docs</p>
    </footer>

    <script>
        const BASE_URL = "https://wwupt.netlify.app/.netlify/functions/api-expenses";
        
        // Elementos
        const categoryInput = document.getElementById('categoryInput');
        const urlPreview = document.getElementById('urlPreview');
        const testBtn = document.getElementById('testBtn');
        const outputConsole = document.getElementById('outputConsole');
        const statusCodeSpan = document.getElementById('statusCode');
        const consoleArea = document.getElementById('consoleArea');

        // Função para atualizar o URL visualmente enquanto escreve
        function updateUrlPreview() {
            const cat = categoryInput.value.trim();
            if (cat) {
                urlPreview.innerText = `${BASE_URL}?category=${encodeURIComponent(cat)}`;
            } else {
                urlPreview.innerText = BASE_URL;
            }
        }

        // Evento: Atualizar URL ao escrever
        categoryInput.addEventListener('input', updateUrlPreview);
        // Inicializar URL
        updateUrlPreview();

        // Evento: Clicar no Botão Testar
        testBtn.addEventListener('click', async () => {
            // UI Loading
            testBtn.disabled = true;
            testBtn.innerText = "A carregar...";
            consoleArea.style.display = 'none';
            outputConsole.innerText = "";

            // Construir URL final
            const cat = categoryInput.value.trim();
            let fetchUrl = BASE_URL;
            if (cat) {
                fetchUrl += `?category=${encodeURIComponent(cat)}`;
            }

            try {
                const start = performance.now();
                const response = await fetch(fetchUrl);
                const duration = (performance.now() - start).toFixed(0);

                // Status
                statusCodeSpan.innerText = `${response.status} ${response.statusText} (${duration}ms)`;
                statusCodeSpan.style.color = response.ok ? "var(--success)" : "var(--error)";

                // JSON
                const data = await response.json();
                outputConsole.innerText = JSON.stringify(data, null, 2);
                outputConsole.style.color = response.ok ? "var(--success)" : "var(--error)";

                consoleArea.style.display = 'block';
                outputConsole.style.display = 'block';

            } catch (error) {
                consoleArea.style.display = 'block';
                outputConsole.style.display = 'block';
                statusCodeSpan.innerText = "ERRO DE REDE";
                statusCodeSpan.style.color = "var(--error)";
                outputConsole.innerText = error.message;
            } finally {
                testBtn.disabled = false;
                testBtn.innerText = "Testar Endpoint";
            }
        });
    </script>
</body>
</html>
